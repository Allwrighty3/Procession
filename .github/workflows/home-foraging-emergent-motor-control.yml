name: Home Foraging Emergent Motor Control

on:
  pull_request:
  workflow_dispatch:

jobs:
  experiment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '27.3.4.2'
      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test
      - name: Run emergent movement no-teacher control
        run: mix procession.metrics.home_foraging_emergent_motor_control | tee home-foraging-emergent-motor-control.txt
      - uses: actions/upload-artifact@v4
        with:
          name: home-foraging-emergent-motor-control
          path: home-foraging-emergent-motor-control.txt
