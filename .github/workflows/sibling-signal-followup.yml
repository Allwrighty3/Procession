name: Sibling Signal Follow-up

on:
  pull_request:
    paths:
      - 'lib/procession/simulation/primitive_development_experiment.ex'
      - 'lib/mix/tasks/procession.metrics.sibling_signal_followup.ex'
      - 'test/procession/simulation/sibling_signal_followup_experiment_test.exs'
      - '.github/workflows/sibling-signal-followup.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  experiment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.18.3'
      - run: mix deps.get
      - run: mix compile
      - name: Run focused primitive-body tests
        shell: bash
        run: |
          set -o pipefail
          mix test test/procession/simulation/sibling_signal_followup_experiment_test.exs 2>&1 | tee sibling-signal-test.txt
      - name: Upload focused test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sibling-signal-test
          path: sibling-signal-test.txt
      - name: Run primitive developmental diagnostic
        shell: bash
        run: |
          set -o pipefail
          mix procession.metrics.sibling_signal_followup | tee sibling-signal-followup.txt
      - uses: actions/upload-artifact@v4
        with:
          name: sibling-signal-followup
          path: sibling-signal-followup.txt
