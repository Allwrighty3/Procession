name: Elixir CI

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18.3"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-otp-27-elixir-1.18.3-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp-27-elixir-1.18.3-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run tests
        run: mix test

      - name: Run physical caregiver guidance experiment
        run: mix procession.metrics.physical_guidance --population 48 --assisted-ticks 160 --withdrawal-ticks 100 --seed 1 --output physical-guidance-metrics.txt

      - name: Upload physical guidance metrics
        uses: actions/upload-artifact@v4
        with:
          name: physical-guidance-metrics
          path: physical-guidance-metrics.txt
