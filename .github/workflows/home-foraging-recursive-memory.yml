name: Home Foraging Recursive Memory

on:
  workflow_dispatch:

jobs:
  experiment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '27.3.4.2'
      - run: mix deps.get
      - run: mix compile
      - name: Run focused recursive-memory test
        id: focused
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          mix test test/procession/simulation/home_foraging_recursive_memory_integration_test.exs --trace 2>&1 | tee recursive-memory-test.txt
      - name: Upload focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recursive-memory-test-diagnostics
          path: recursive-memory-test.txt
      - name: Stop after focused failure
        if: steps.focused.outcome == 'failure'
        run: exit 1
      - run: mix test
      - name: Run recursive memory integration audit
        run: mix procession.metrics.home_foraging_recursive_memory | tee home-foraging-recursive-memory.txt
      - uses: actions/upload-artifact@v4
        with:
          name: home-foraging-recursive-memory
          path: home-foraging-recursive-memory.txt
