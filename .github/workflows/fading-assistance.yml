name: Fading Assistance Experiment

on:
  push:
    branches:
      - agent/maintenance-activation-coupling
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.18.3"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-otp-27-elixir-1.18.3-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp-27-elixir-1.18.3-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run tests
        run: mix test

      - name: Run learner-owned assistance experiment
        run: |
          mix procession.metrics.learner_owned_assistance \
            --population 48 \
            --stage-ticks 40 \
            --withdrawal-ticks 100 \
            --seed 1 \
            --output learner-owned-assistance-metrics.txt
          echo "## Learner-Owned Assistance Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat learner-owned-assistance-metrics.txt | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload assistance metrics
        uses: actions/upload-artifact@v4
        with:
          name: learner-owned-assistance-metrics
          path: learner-owned-assistance-metrics.txt
