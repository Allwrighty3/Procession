name: Elixir CI

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "25"
          elixir-version: "1.14"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-otp-25-elixir-1.14-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp-25-elixir-1.14-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Run shifting resource comparison
        run: |
          mix run -e 'alias Procession.Simulation.ShiftingResourceExperiment, as: E; c = E.compare(ticks: 180, seeds: Enum.to_list(1..80), source_interval: 30); IO.puts(E.report(c)); Enum.each(E.variants(), fn v -> IO.puts("\n--- #{v} seed 7 ---"); IO.puts(E.report(E.run(variant: v, ticks: 180, seed: 7, source_interval: 30))) end)' | tee shifting-results.txt

      - name: Upload shifting resource results
        uses: actions/upload-artifact@v4
        with:
          name: shifting-resource-results
          path: shifting-results.txt
