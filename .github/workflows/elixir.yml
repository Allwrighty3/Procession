name: Elixir CI

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "25"
          elixir-version: "1.14"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-otp-25-elixir-1.14-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp-25-elixir-1.14-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Run refined shifting resource sweep
        run: |
          mix run -e '
          alias Procession.Simulation.ShiftingResourceExperiment, as: E
          base = [ticks: 300, seeds: Enum.to_list(1..100)]
          scenarios = [
            {:e, [source_interval: 60, source_intake: 0.18, intake_falloff: 0.030, move_cost: 0.004, remain_cost: 0.001, integrity_loss: 0.015, learning_deposit: 0.38, contradiction_magnitude: 0.32]},
            {:f, [source_interval: 70, source_intake: 0.18, intake_falloff: 0.030, move_cost: 0.004, remain_cost: 0.001, integrity_loss: 0.018, learning_deposit: 0.38, contradiction_magnitude: 0.32]},
            {:g, [source_interval: 60, source_intake: 0.20, intake_falloff: 0.035, move_cost: 0.004, remain_cost: 0.001, integrity_loss: 0.016, learning_deposit: 0.42, contradiction_magnitude: 0.36]},
            {:h, [source_interval: 80, source_intake: 0.18, intake_falloff: 0.030, move_cost: 0.004, remain_cost: 0.001, integrity_loss: 0.018, learning_deposit: 0.40, contradiction_magnitude: 0.34]}
          ]
          Enum.each(scenarios, fn {name, opts} ->
            IO.puts("\n=== #{name} #{inspect(opts)} ===")
            IO.puts(E.report(E.compare(Keyword.merge(base, opts))))
          end)
          ' | tee shifting-sweep.txt

      - name: Upload refined shifting resource sweep
        uses: actions/upload-artifact@v4
        with:
          name: shifting-resource-sweep-refined
          path: shifting-sweep.txt
