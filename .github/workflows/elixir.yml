name: Elixir CI

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "25"
          elixir-version: "1.14"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-otp-25-elixir-1.14-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp-25-elixir-1.14-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Run 100-sample causal attribution metrics
        run: mix procession.metrics.independent_change --samples 100 --ticks 220 | tee independent-change-metrics.txt

      - name: Upload causal attribution metrics
        uses: actions/upload-artifact@v4
        with:
          name: independent-change-metrics
          path: independent-change-metrics.txt
