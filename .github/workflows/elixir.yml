name: Elixir CI

on:
  push:
    branches:
      - main
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "25"
          elixir-version: "1.14"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-otp-25-elixir-1.14-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp-25-elixir-1.14-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Run 100-sample causal attribution metrics
        run: mix procession.metrics.independent_change --samples 100 --ticks 220 | tee independent-change-metrics.txt

      - name: Run 100-sample association reversal metrics
        run: mix procession.metrics.association_reversal --samples 100 --ticks 180 --reversal-tick 90 | tee association-reversal-metrics.txt

      - name: Run 100-sample motor competition metrics
        run: mix procession.metrics.motor_competition --samples 100 --ticks 180 --reversal-tick 90 | tee motor-competition-metrics.txt

      - name: Run 100-sample refractory plasticity metrics
        run: mix procession.metrics.refractory_plasticity --samples 100 --ticks 180 --reversal-tick 90 | tee refractory-plasticity-metrics.txt

      - name: Run 100-sample motor-plasticity factorial metrics
        run: mix procession.metrics.motor_plasticity_factorial --samples 100 --ticks 180 --reversal-tick 90 | tee motor-plasticity-factorial-metrics.txt

      - name: Run 100-sample stable retention factorial metrics
        run: mix procession.metrics.stable_retention_factorial --samples 100 --ticks 220 | tee stable-retention-factorial-metrics.txt

      - name: Run 100-sample closed grid world metrics
        run: mix procession.metrics.closed_grid_world --samples 100 --ticks 320 | tee closed-grid-world-metrics.txt

      - name: Run parent-guided versus no-parent development metrics
        run: mix procession.metrics.parent_guided_development --samples 20 --ticks 1500 --output parent-guided-development-metrics.txt

      - name: Run embodied caregiver regulation metrics
        run: mix procession.metrics.embodied_attachment --samples 20 --ticks 1800

      - name: Run responsive parent development metrics
        run: mix procession.metrics.responsive_parent --samples 20 --ticks 1800 --output responsive-parent-metrics.txt

      - name: Run relational field attachment metrics
        run: mix procession.metrics.relational_attachment --samples 20 --ticks 1800 --output relational-attachment-metrics.txt

      - name: Upload simulation metrics
        uses: actions/upload-artifact@v4
        with:
          name: simulation-metrics
          path: |
            independent-change-metrics.txt
            association-reversal-metrics.txt
            motor-competition-metrics.txt
            refractory-plasticity-metrics.txt
            motor-plasticity-factorial-metrics.txt
            stable-retention-factorial-metrics.txt
            closed-grid-world-metrics.txt
            parent-guided-development-metrics.txt
            embodied-attachment-metrics.txt
            responsive-parent-metrics.txt
            relational-attachment-metrics.txt
