name: Home Foraging Need Dynamics

on:
  pull_request:
  workflow_dispatch:

jobs:
  experiment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '27.3.4.2'
      - run: mix deps.get
      - run: mix compile
      - run: mix test test/procession/simulation/home_foraging_need_dynamics_experiment_test.exs
      - run: mix test
      - name: Run continuous need dynamics comparison
        run: mix procession.metrics.home_foraging_need_dynamics | tee home-foraging-need-dynamics.txt
      - uses: actions/upload-artifact@v4
        with:
          name: home-foraging-need-dynamics
          path: home-foraging-need-dynamics.txt
