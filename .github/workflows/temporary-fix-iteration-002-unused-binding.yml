name: Temporary Iteration 002 Compile Fix

on:
  pull_request:
    paths:
      - ".github/workflows/temporary-fix-iteration-002-unused-binding.yml"

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch unused binding and remove temporary workflow
        run: |
          python3 - <<'PY'
          from pathlib import Path

          source = Path("lib/procession/simulation/revision_displacement_factorial_experiment.ex")
          text = source.read_text(encoding="utf-8")
          old = "defp maybe_compete(field, effect, requested, state, tick, options) do"
          new = "defp maybe_compete(field, effect, requested, _state, tick, options) do"
          if text.count(old) != 1:
              raise SystemExit(f"expected one target binding, found {text.count(old)}")
          source.write_text(text.replace(old, new), encoding="utf-8")
          Path(".github/workflows/temporary-fix-iteration-002-unused-binding.yml").unlink()
          PY

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/procession/simulation/revision_displacement_factorial_experiment.ex \
            .github/workflows/temporary-fix-iteration-002-unused-binding.yml
          git commit -m "Fix Iteration 002 unused binding"
          git push origin HEAD:${{ github.head_ref }}
