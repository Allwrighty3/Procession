name: Home Foraging Memory Performance

on:
  workflow_dispatch:

jobs:
  experiment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.18.4'
          otp-version: '27.3.4.2'
      - run: mix deps.get
      - run: mix compile
      - run: mix test test/procession/simulation/home_foraging_memory_performance_experiment_test.exs
      - run: mix test
      - name: Run closed-loop memory performance comparison
        run: mix procession.metrics.home_foraging_memory_performance | tee home-foraging-memory-performance.txt
      - uses: actions/upload-artifact@v4
        with:
          name: home-foraging-memory-performance
          path: home-foraging-memory-performance.txt
