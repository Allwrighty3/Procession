name: Relational Terrain Prototype

on:
  push:
    branches:
      - agent/**
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Erlang and Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "25"
          elixir-version: "1.14"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-otp-25-elixir-1.14-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp-25-elixir-1.14-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run relational terrain tests
        run: mix test test/procession/simulation/relational_terrain_test.exs test/procession/simulation/terrain_relaxer_test.exs test/procession/simulation/relational_terrain_settling_test.exs

      - name: Run relational terrain settling metrics
        if: always()
        run: mix procession.metrics.relational_terrain_settling | tee relational-terrain-settling-metrics.txt

      - name: Upload settling metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relational-terrain-settling-metrics
          path: relational-terrain-settling-metrics.txt
